name: Windows Build

on:
  push:
    branches:
      - feat/windows-support
      - main
      - claude/clone-github-repo-rvM1A
      - feat/shadcn-sidebar
  pull_request:
    branches:
      - main

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npx @electron/rebuild

      - name: Run tests
        run: npm test

      - name: Generate icon.ico from PNG
        run: magick public/icon-512.png -define icon:auto-resize=256,128,64,48,32,16 public/icon.ico

      - name: Build Windows installer (NSIS)
        run: npm run electron:build:win
        env:
          ELECTRON_BUILD: '1'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dorothy-windows
          path: release/*.exe
          if-no-files-found: warn
          retention-days: 7
